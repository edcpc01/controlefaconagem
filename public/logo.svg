<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="14" fill="#1457B4"/>

  <!-- Spool top flange -->
  <rect x="20" y="14" width="26" height="7" rx="3.5" fill="white"/>

  <!-- Spool body (trapezoid: narrow top, wide bottom) -->
  <path d="M22,21 L44,21 L53,79 L13,79 Z" fill="none" stroke="white" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Diagonal thread lines clipped to spool body -->
  <clipPath id="c">
    <path d="M22,21 L44,21 L53,79 L13,79 Z"/>
  </clipPath>
  <g clip-path="url(#c)" stroke="white" stroke-width="1.6" opacity="0.85">
    <line x1="5"  y1="25" x2="60" y2="58"/>
    <line x1="5"  y1="39" x2="60" y2="72"/>
    <line x1="5"  y1="53" x2="60" y2="86"/>
    <line x1="9"  y1="14" x2="60" y2="44"/>
  </g>

  <!-- Spool bottom flange -->
  <rect x="10" y="76" width="44" height="9" rx="4" fill="white"/>

  <!-- Letter D (italic, right side) -->
  <text
    x="57" y="80"
    font-family="Georgia, 'Times New Roman', serif"
    font-style="italic"
    font-weight="bold"
    font-size="62"
    fill="white"
  >D</text>
</svg>
