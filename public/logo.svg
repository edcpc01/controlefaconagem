<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <!-- Denim diagonal texture -->
    <pattern id="denim" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(-45)">
      <rect width="6" height="6" fill="#1c3d7a"/>
      <rect x="0" y="0" width="2" height="6" fill="#172f60" opacity="0.6"/>
    </pattern>
    <pattern id="denim2" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="4" height="4" fill="transparent"/>
      <rect x="0" y="0" width="1" height="4" fill="#ffffff" opacity="0.03"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="22" fill="#1c3d7a"/>
  <rect width="200" height="200" rx="22" fill="url(#denim)" opacity="0.7"/>
  <rect width="200" height="200" rx="22" fill="url(#denim2)" opacity="1"/>

  <!-- ── Factory / Industrial silhouette ── -->
  <!-- Base ground line area -->
  <rect x="0" y="108" width="200" height="3" rx="1" fill="white" opacity="0.15"/>

  <!-- Factory complex — single white filled path -->
  <path fill="white" opacity="0.95" d="
    M 8,108
    L 8,88
    L 14,88  L 14,78  L 16,78  L 16,88
    L 22,88  L 22,72  L 24,72  L 24,66  L 26,66  L 26,72  L 30,72
    L 30,62  L 32,62  L 32,56  L 34,56  L 34,62
    L 36,62  L 36,50  L 38,50  L 38,44  L 40,44  L 40,50
    L 44,50  L 44,62  L 48,62  L 48,68
    L 52,68  L 52,58  L 54,58  L 54,50  L 56,50  L 56,58
    L 60,58  L 60,64  L 64,64  L 64,55  L 66,55  L 66,50  L 68,50  L 68,55
    L 70,55  L 70,62  L 74,62
    L 74,52  L 76,52  L 76,44  L 78,44  L 78,52
    L 82,52  L 82,60  L 86,60  L 86,72
    L 90,72  L 90,65  L 92,65  L 92,60  L 94,60  L 94,65
    L 98,65  L 98,72  L 104,72
    L 104,65 L 108,65 L 108,72
    L 112,72 L 112,62 L 114,62 L 114,55 L 116,55 L 116,62
    L 120,62 L 120,72
    L 126,72 L 126,78 L 130,78 L 130,72
    L 136,72 L 136,65 L 138,65 L 138,60 L 140,60 L 140,65
    L 144,65 L 144,78
    L 148,78 L 148,70 L 150,70 L 150,64 L 152,64 L 152,70
    L 156,70 L 156,80 L 160,80 L 160,72
    L 164,72 L 164,80 L 168,80 L 168,88
    L 172,88 L 172,82 L 174,82 L 174,76 L 176,76 L 176,82
    L 182,82 L 182,88
    L 192,88 L 192,108
    Z
  "/>

  <!-- Windows/detail on main buildings (small rectangles) -->
  <rect x="32" y="64" width="3" height="4" rx="0.5" fill="#1c3d7a" opacity="0.5"/>
  <rect x="54" y="52" width="2" height="3" rx="0.5" fill="#1c3d7a" opacity="0.5"/>
  <rect x="76" y="46" width="2" height="3" rx="0.5" fill="#1c3d7a" opacity="0.5"/>
  <rect x="114" y="57" width="2" height="3" rx="0.5" fill="#1c3d7a" opacity="0.5"/>
  <rect x="150" y="66" width="2" height="3" rx="0.5" fill="#1c3d7a" opacity="0.5"/>
  <rect x="174" y="78" width="2" height="3" rx="0.5" fill="#1c3d7a" opacity="0.5"/>

  <!-- ── Cursive D letter ── -->
  <text
    x="100" y="148"
    text-anchor="middle"
    font-family="Georgia, 'Book Antiqua', 'Palatino Linotype', serif"
    font-style="italic"
    font-weight="bold"
    font-size="78"
    fill="white"
    opacity="0.97"
    letter-spacing="-2"
  >D</text>

  <!-- ── DOPTEX text ── -->
  <text
    x="100" y="182"
    text-anchor="middle"
    font-family="'Arial Black', 'Franklin Gothic Heavy', 'Impact', sans-serif"
    font-weight="900"
    font-size="28"
    fill="white"
    letter-spacing="4"
  >DOPTEX</text>
</svg>
